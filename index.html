<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>South Korea Data Center & Drought Status Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="./styles.css"/>

  <script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script defer src="./data/drought-data.js"></script>
  <script defer src="./data/dc-data.js"></script>
  <script defer src="./app.js"></script>
</head>
<body>
  <div id="map"></div>

  <div class="info-panel">
    <h3>Korea Data Centers × Drought</h3>
    <p>Infrastructure overlay with real-time drought status (2026.03.15)</p>
    <div class="stat-bar">
      <div class="stat-item">
        <div class="stat-num" id="total-count">0</div>
        <div class="stat-label">Total DCs</div>
      </div>
      <div class="stat-item">
        <div class="stat-num" id="visible-count">0</div>
        <div class="stat-label">Visible</div>
      </div>
      <div class="stat-item">
        <div class="stat-num">9</div>
        <div class="stat-label">Types</div>
      </div>
    </div>
  </div>
</body>
</html>
